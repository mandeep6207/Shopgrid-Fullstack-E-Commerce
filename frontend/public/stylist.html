<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Smart Stylist - ShopGrid</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Stylist specific styles */
      .stylist-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 20px;
      }

      .stylist-header {
        text-align: center;
        margin-bottom: 50px;
      }

      .stylist-header h1 {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 10px;
        color: #1a1a1a;
      }

      .stylist-header p {
        font-size: 1.1rem;
        color: #666;
        max-width: 500px;
        margin: 0 auto;
      }

      .stylist-main {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 60px;
        align-items: start;
      }

      /* Upload Section */
      .upload-section {
        display: flex;
        flex-direction: column;
        gap: 30px;
      }

      .upload-area {
        border: 3px dashed #ddd;
        border-radius: 12px;
        padding: 40px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
        background: #f9f9f9;
      }

      .upload-area:hover {
        border-color: #ff6b6b;
        background: #fff5f5;
      }

      .upload-area.dragover {
        border-color: #ff6b6b;
        background: #ffe0e0;
        transform: scale(1.02);
      }

      .upload-icon {
        font-size: 3rem;
        margin-bottom: 15px;
      }

      .upload-area h3 {
        margin: 10px 0;
        color: #1a1a1a;
      }

      .upload-area p {
        color: #999;
        font-size: 0.95rem;
      }

      #fileInput {
        display: none;
      }

      .preview-area {
        border-radius: 12px;
        overflow: hidden;
        background: #f0f0f0;
        min-height: 300px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .preview-image {
        max-width: 100%;
        max-height: 400px;
        width: auto;
        height: auto;
        object-fit: cover;
      }

      .preview-placeholder {
        color: #ccc;
        text-align: center;
      }

      .placeholder-text {
        font-size: 0.95rem;
        color: #999;
      }

      /* Button */
      .analyze-btn {
        background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);
        color: white;
        border: none;
        padding: 15px 30px;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
        width: 100%;
      }

      .analyze-btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(255, 107, 107, 0.3);
      }

      .analyze-btn:active:not(:disabled) {
        transform: translateY(0);
      }

      .analyze-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      /* Results Section */
      .results-section {
        min-height: 400px;
      }

      .analysis-box {
        background: #f9f9f9;
        border-radius: 12px;
        padding: 30px;
        margin-bottom: 30px;
        border-left: 4px solid #ff6b6b;
      }

      .analysis-box h3 {
        margin-top: 0;
        color: #1a1a1a;
      }

      .style-attributes {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        margin: 20px 0;
      }

      .attribute {
        background: white;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #eee;
      }

      .attribute-label {
        font-size: 0.85rem;
        color: #999;
        text-transform: uppercase;
        font-weight: 600;
        margin-bottom: 5px;
      }

      .attribute-value {
        font-size: 1rem;
        color: #1a1a1a;
        font-weight: 500;
      }

      .colors-display {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 10px;
      }

      .color-swatch {
        width: 40px;
        height: 40px;
        border-radius: 6px;
        border: 1px solid #ddd;
        cursor: pointer;
        transition: transform 0.2s;
      }

      .color-swatch:hover {
        transform: scale(1.1);
      }

      .confidence-bar {
        background: #eee;
        height: 8px;
        border-radius: 4px;
        margin-top: 10px;
        overflow: hidden;
      }

      .confidence-fill {
        height: 100%;
        background: linear-gradient(90deg, #51cf66, #ff6b6b);
        border-radius: 4px;
        transition: width 0.5s ease;
      }

      /* Recommendations */
      .recommendations {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
      }

      .rec-card {
        background: white;
        border: 1px solid #eee;
        border-radius: 12px;
        overflow: hidden;
        transition: all 0.3s ease;
        cursor: pointer;
      }

      .rec-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      }

      .rec-image {
        width: 100%;
        height: 200px;
        background: #f0f0f0;
        overflow: hidden;
        position: relative;
      }

      .rec-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .rec-image-placeholder {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ccc;
        font-size: 2rem;
      }

      .rec-score {
        position: absolute;
        top: 10px;
        right: 10px;
        background: #ff6b6b;
        color: white;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: 600;
      }

      .rec-content {
        padding: 20px;
      }

      .rec-title {
        font-size: 1rem;
        font-weight: 600;
        color: #1a1a1a;
        margin: 0 0 8px 0;
        line-height: 1.3;
        min-height: 2.6em;
      }

      .rec-category {
        font-size: 0.85rem;
        color: #999;
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      .rec-price {
        font-size: 1.3rem;
        font-weight: 700;
        color: #ff6b6b;
        margin-bottom: 8px;
      }

      .rec-reason {
        font-size: 0.9rem;
        color: #666;
        margin-bottom: 12px;
        font-style: italic;
      }

      .rec-rating {
        font-size: 0.9rem;
        color: #ff9800;
        margin-bottom: 12px;
      }

      .rec-btn {
        width: 100%;
        background: #f0f0f0;
        border: 1px solid #ddd;
        padding: 10px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        color: #1a1a1a;
        transition: all 0.2s;
      }

      .rec-btn:hover {
        background: #ff6b6b;
        color: white;
        border-color: #ff6b6b;
      }

      /* Loading State */
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        color: #666;
      }

      .spinner {
        width: 20px;
        height: 20px;
        border: 3px solid #f0f0f0;
        border-top-color: #ff6b6b;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .error-message {
        background: #ffebee;
        border-left: 4px solid #ff6b6b;
        color: #c62828;
        padding: 15px;
        border-radius: 6px;
        margin-top: 20px;
      }

      /* Empty State */
      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #999;
      }

      .empty-state-icon {
        font-size: 3rem;
        margin-bottom: 15px;
      }

      /* Mobile Responsive */
      @media (max-width: 768px) {
        .stylist-main {
          grid-template-columns: 1fr;
          gap: 30px;
        }

        .stylist-header h1 {
          font-size: 2rem;
        }

        .style-attributes {
          grid-template-columns: 1fr;
        }

        .recommendations {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar"></nav>

    <!-- Main Container -->
    <div class="stylist-container">
      <!-- Header -->
      <div class="stylist-header">
        <h1>✨ AI Smart Stylist</h1>
        <p>Upload a photo of your outfit and let our AI recommend products that match your style perfectly.</p>
      </div>

      <!-- Main Content -->
      <div class="stylist-main">
        <!-- Upload Section -->
        <div class="upload-section">
          <div
            class="upload-area"
            id="uploadArea"
            onclick="document.getElementById('fileInput').click();"
          >
            <div class="upload-icon">📸</div>
            <h3>Upload Your Outfit</h3>
            <p>Click to upload or drag and drop</p>
            <p class="placeholder-text">PNG, JPG, JPEG (max 5MB)</p>
          </div>
          <input
            type="file"
            id="fileInput"
            accept="image/*"
            style="display: none;"
          />

          <!-- Preview -->
          <div class="preview-area" id="previewArea">
            <div class="preview-placeholder">
              <p class="placeholder-text">Image preview will appear here</p>
            </div>
          </div>

          <!-- Analyze Button -->
          <button
            class="analyze-btn"
            id="analyzeBtn"
            disabled
            onclick="analyzeOutfit()"
          >
            🚀 Analyze My Style
          </button>

          <!-- Status Message -->
          <div id="statusMessage" style="text-align: center; color: #666; font-size: 0.9rem;"></div>
        </div>

        <!-- Results Section -->
        <div class="results-section" id="resultsSection">
          <div class="empty-state">
            <div class="empty-state-icon">👗</div>
            <p>Upload an outfit photo to get personalized recommendations</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
    <script src="stylist.js"></script>
  </body>
</html>
